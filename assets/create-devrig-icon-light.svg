<svg xmlns="http://www.w3.org/2000/svg" width="340" height="340"
     viewBox="0 0 340 340" role="img" aria-labelledby="title desc">
  <title id="title">create-devrig logo</title>
  <desc id="desc">A terminal prompt launches into a compact devrig hexagon, representing one-command workspace scaffolding.</desc>
  <defs>
    <linearGradient id="brandGradient" x1="54" y1="61" x2="286" y2="278" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.52" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="trailGradient" x1="91" y1="170" x2="210" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="30" y="44" width="280" height="252" rx="40"
        fill="#FFFFFF" fill-opacity="0.03"
        stroke="url(#brandGradient)" stroke-width="12"/>

  <circle cx="65" cy="78" r="6" fill="#22D3EE"/>
  <circle cx="87" cy="78" r="6" fill="#3B82F6"/>
  <circle cx="109" cy="78" r="6" fill="#8B5CF6"/>

  <path d="M65 140 L96 170 L65 200"
        fill="none" stroke="url(#brandGradient)" stroke-width="14"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M113 204 H144"
        fill="none" stroke="#22D3EE" stroke-width="12"
        stroke-linecap="round"/>

  <path d="M125 170 H177"
        fill="none" stroke="url(#trailGradient)" stroke-width="10"
        stroke-linecap="round"/>
  <path d="M145 150 H169 M145 190 H169"
        fill="none" stroke="url(#trailGradient)" stroke-width="6"
        stroke-linecap="round" opacity="0.75"/>

  <g>
    <path d="M230 112 L283 143 L283 205 L230 236 L177 205 L177 143 Z"
          fill="#FFFFFF" fill-opacity="0.92"
          stroke="url(#brandGradient)" stroke-width="10"
          stroke-linejoin="round"/>

    <rect x="198" y="145" width="63" height="17" rx="6"
          fill="none" stroke="url(#brandGradient)" stroke-width="6"/>
    <rect x="198" y="166" width="63" height="17" rx="6"
          fill="none" stroke="url(#brandGradient)" stroke-width="6"/>
    <rect x="198" y="187" width="63" height="17" rx="6"
          fill="none" stroke="url(#brandGradient)" stroke-width="6"/>

    <circle cx="210" cy="153.5" r="3.3" fill="#22D3EE"/>
    <circle cx="210" cy="174.5" r="3.3" fill="#3B82F6"/>
    <circle cx="210" cy="195.5" r="3.3" fill="#8B5CF6"/>

    <path d="M218 153.5 H247 M218 174.5 H242 M218 195.5 H248"
          fill="none" stroke="url(#brandGradient)" stroke-width="4.5"
          stroke-linecap="round"/>
  </g>

  <path d="M284 95 L291 111 L307 118 L291 125 L284 141 L277 125 L261 118 L277 111 Z"
        fill="url(#brandGradient)" filter="url(#glow)"/>

  
</svg>